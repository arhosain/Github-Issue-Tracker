<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


<!-- google font geist  -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">



<link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
  <title>Github-Issue-Tracker
</title>

<link rel="stylesheet" href="css/style.css">

<!--tailwind + daisy ui  -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome  cdn -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
  integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
  crossorigin="anonymous" referrerpolicy="no-referrer" />



  <script>
    if (!sessionStorage.getItem('loggedIn')) {
      window.location.replace = "./login.html";
    }
  </script>
</head>
<body>
  <header>
    <nav class="bg-base-100 shadow-sm">
      <div class="navbar  max-w-10/11 mx-auto flex flex-wrap">
        <div class="flex-1 ">
          <a class="btn btn-ghost text-xl whitespace-nowrap"><i class="fa-brands fa-github text-3xl"></i> GitHub Issues Tracker</a>
        </div>
        <div class=" flex flex-row gap-2 mt-4 mb-2">
          <input id="searchInput" type="text" placeholder="🔍 Search issues..." class="input input-bordered md:w-auto w-full" />
          <div>
            <button onclick="searchIssues()" class="btn btn-primary w-full whitespace-nowrap">+ New Issue</button>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="max-w-[1300px] mx-auto p-2 ">



    



    <section class="tabs shadow-lg mt-10 p-5 border border-gray-200 rounded-lg flex gap-3">
      <button id="all-tab" onclick="loadIssues(event)" class="btn  w-20 active ">All</button>
      
      <button onclick="loadIssuesByStatus('open', event)" class="btn  w-25 active">Open</button>

      <button onclick="loadIssuesByStatus('closed', event)" class="btn w-25 active">Closed</button>

    </section>


    <!-- spinner  -->
    <div id="loader" class="text-center  hidden mt-3 mb-5">
      <span class="loading loading-spinner text-primary"></span>
    </div>



<div class="mt-10 shadow-lg  border border-gray-200 rounded-lg">
  <section class="border-b-2 border-gray-200 p-5 flex justify-between items-center flex-wrap">
    <div class="flex gap-2 items-center ">
      <div><img src="assets/Aperture.png" alt=""></div>
      <div>
        <h4 class="text-2xl font-semibold"><span id="card-length">0</span>
          Issues</h4>
        <p>Track and manage your project issues</p>
      </div>
    </div>
  
    <div class="flex gap-4">
  
      <p><span class="text-2xl text-green-600">● </span>Open</p>
      <p><span class="text-2xl text-purple-600">● </span>Closed</p>
  
    </div>
  </section>
    <section id="level-container" class=" mt-3 p-5  grid grid-cols-1 lg:grid-cols-4 gap-4 "  >
       
    </section>
</div>
  </main>

    </div>
  </div>

<dialog id="issue_modal" class="modal">
  <div class="modal-box space-y-5  w-10/11">

    <h3 id="modal-title" class="text-xl font-bold"></h3>
   
    <div class="flex gap-2 flex-wrap">
      <p id="modal-status" class="px-2 bg-green-600 rounded-2xl text-white whitespace-nowrap text-center flex items-center" >
        
      </p>
      
      <p class="text-gray-500"><span class="font-semibold">● Open by </span>
        <span id="modal-author"></span>
      </p>
      
      <p class="text-gray-500"><span class="font-semibold">● </span>
        <span id="modal-date"></span>
      </p>
    </div>

    <div class="labels-status flex gap-2 flex-wrap">
      <button id="label-status-1" class="bg-red-100 border rounded-3xl border-red-300 text-red-500 px-2   focus:outline-none focus:ring-0    ">not added</button>
      <button id="label-status-2" class="bg-green-100 border rounded-3xl border-green-300 text-green-600 px-2  ">not added</button>
    </div>
    <!-- <div> 
  <div id="modal-labels"  class="flex gap-2 mt-1 flex-wrap  "></div>
    </div> -->

    <p id="modal-description" class="text-gray-500">
      
    </p>

    <div class="flex gap-5 rounded-lg flex-wrap p-3 bg-blue-50">
      <div class="">
        <p class="font-semibold text-gray-400">Assignee:</p>
        <p id="modal-assignee" class="font-semibold"></p>
      </div>
      
      <div>
        <p class=" text-gray-400">Priority:</p>
        <p id="modal-priority" class=" px-2 text-center rounded-3xl py-1 text-white"></p>
      </div>
    </div>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary">Close</button>
      </form>
    </div>

  </div>
</dialog>

  <script src="js/script.js"></script>
</body>
</html>
